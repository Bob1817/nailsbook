name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm test -- --runInBand
        env:
          DATABASE_URL: file:./test.db
          ADMIN_JWT_SECRET: ci-test-admin-secret-not-for-production
          TECHNICIAN_JWT_SECRET: ci-test-technician-secret-not-for-production
          CLIENT_JWT_SECRET: ci-test-client-secret-not-for-production
          JWT_EXPIRES_IN: 1h
      - run: npm run build

  frontend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - admin-frontend
          - client-frontend
          - technician-frontend
          - landing-frontend
    defaults:
      run:
        working-directory: ./${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - run: npm ci
      - run: npm run build
